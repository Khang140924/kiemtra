<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Sinh Viên</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif;
        }
        .register-card { 
            width: 100%; max-width: 450px; margin: 15px; border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .register-card:hover { transform: translateY(-5px); }
        .register-header { background-color: transparent; color: #333; padding: 30px 20px 10px; text-align: center; }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3); transition: all 0.2s;}
        .btn-success:hover { transform: scale(1.03); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4); }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e5e7eb; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-control:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body>
    <div class="card register-card">
        <div class="register-header border-0">
            <h3 class="mb-0 fw-bold text-success">📝 Đăng Ký</h3>
            <p class="text-muted small mt-2">Hệ thống Đăng ký học phần</p>
        </div>
        <div class="card-body px-4 pb-4 pt-2">
            <form th:action="@{/register}" th:object="${student}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Tài khoản (Username)</label>
                    <input type="text" th:field="*{username}" class="form-control" required placeholder="Chọn tên đăng nhập..."/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required placeholder="Nhập email của bạn..."/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Mật khẩu (Password)</label>
                    <input type="password" th:field="*{password}" class="form-control" required placeholder="Nhập mật khẩu..."/>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-pill">Đăng Ký</button>
            </form>
            <div class="text-center mt-3">
                <span class="text-muted">Đã có tài khoản? </span>
                <a th:href="@{/login}" class="text-decoration-none fw-bold">Đăng nhập</a>
            </div>
            <div class="text-center mt-2">
                <a th:href="@{/home}" class="text-decoration-none text-muted">Về trang chủ</a>
            </div>
        </div>
    </div>
</body>
</html>
