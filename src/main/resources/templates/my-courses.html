<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Quản Lý Học Phần</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .navbar { background: linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%) !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }
        .course-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; overflow: hidden; background: #ffffff; }
        .course-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04) !important; }
        .course-img { height: 180px; object-fit: cover; transition: transform 0.6s ease; }
        .course-card:hover .course-img { transform: scale(1.08); }
        .btn-secondary { background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); border: none; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { transform: scale(1.03); box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-info mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand text-white" href="/home">📚 Hệ Thống Quản Lý Học Phần</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3" sec:authorize="isAuthenticated()">
                        <span class="text-light fw-medium">Xin chào, <span sec:authentication="name"></span>!</span>
                    </li>
                    <li class="nav-item me-2">
                        <a th:href="@{/home}" class="btn btn-primary btn-sm px-3 rounded-pill text-white fw-bold">Trở về Trang chủ</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm px-3 rounded-pill">Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">🎓 Khóa học của tôi (My Courses)</h2>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <!-- Vòng lặp lấy dữ liệu môn học -->
            <div class="col" th:each="course : ${courses}">
                <div class="card h-100 course-card">
                    <!-- Ảnh môn học (Chữa lỗi hỏng ảnh) -->
                    <img th:if="${course.image != null and !course.image.isEmpty()}" 
                         th:src="@{'/images/' + ${course.image}}" 
                         onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1516321497487-e288fb19713f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80';"
                         class="card-img-top course-img" alt="Course Image">
                    <img th:unless="${course.image != null and !course.image.isEmpty()}" 
                         src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
                         class="card-img-top course-img" alt="Placeholder Image">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-primary mb-3" th:text="${course.name}">Tên môn học</h5>
                        <p class="card-text text-muted mb-2">
                            <strong>Số tín chỉ:</strong> <span th:text="${course.credits}">3</span>
                        </p>
                        <p class="card-text text-muted mb-4">
                            <strong>Giảng viên:</strong> <span th:text="${course.lecturer}">Tên giảng viên</span>
                        </p>
                        
                        <div class="mt-auto">
                            <button class="btn btn-secondary w-100 fw-bold rounded-pill text-uppercase" disabled>ĐÃ ĐĂNG KÝ</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 text-center" th:if="${courses == null or courses.isEmpty()}">
                <p class="text-muted fs-5 mt-4">Bạn chưa đăng ký khóa học nào. <a th:href="@{/home}">Đăng ký ngay</a>.</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0 small">© 2026 - My Courses Portal (Mobile Friendly)</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
