<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar for Admin -->
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/admin/courses">⚙️ Admin Dashboard</a>
            <a th:href="@{/home}" class="btn btn-outline-light btn-sm">Về Trang Chủ</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0" style="width: 100%; max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0" th:text="${course.id != null ? '✏️ Sửa Môn Học' : '➕ Thêm Môn Học Mới'}"></h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}" />
                    <!-- Giữ lại ảnh cũ nếu có chỉnh sửa mà không upload ảnh mới -->
                    <input type="hidden" th:field="*{image}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên môn học <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" required placeholder="Nhập tên môn..."/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Chọn ảnh minh họa (tuỳ chọn)</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/png, image/jpeg, image/jpg, image/webp" />
                        <small class="text-muted" th:if="${course.image != null}">Đang dùng ảnh: <span th:text="${course.image}"></span>. Để trống nếu không muốn đổi.</small>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số tín chỉ <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{credits}" class="form-control" required min="1" max="10"/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Category ID <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{categoryId}" class="form-control" required />
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Giảng viên <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{lecturer}" class="form-control" required placeholder="Tên giảng viên..."/>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/admin/courses}" class="btn btn-secondary fw-bold">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary fw-bold">Lưu dữ liệu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
