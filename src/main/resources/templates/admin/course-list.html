<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học Phần (ADMIN)</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .navbar { background: #1e293b !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .table thead th { background: #f1f5f9; color: #334155; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }
        .table tbody tr { transition: all 0.2s; border-bottom: 1px solid #f1f5f9; }
        .table tbody tr:hover { background-color: #f8fafc; transform: scale(1.002); }
        .table td { vertical-align: middle; color: #475569; }
        .btn { border-radius: 8px; font-weight: 500; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
    <!-- Navbar for Admin -->
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/admin/courses">⚙️ Admin Dashboard</a>
            <a th:href="@{/home}" class="btn btn-outline-light btn-sm">Về Trang Chủ</a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm mb-4 border">
            <h3 class="mb-0 text-dark fw-bold">Danh sách Học Phần</h3>
            <a th:href="@{/admin/courses/add}" class="btn btn-success fw-bold px-4">+ Thêm môn học</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th class="text-start">Tên môn</th>
                                <th>Tín chỉ</th>
                                <th>Giảng viên</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="course : ${courses}">
                                <td th:text="${course.id}" class="fw-bold text-muted">1</td>
                                <td class="text-start fw-medium" th:text="${course.name}">Tên môn</td>
                                <td><span class="badge bg-info text-dark" th:text="${course.credits}">3</span></td>
                                <td th:text="${course.lecturer}">Giảng viên</td>
                                <td>
                                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-warning btn-sm me-1 fw-bold">Sửa</a>
                                    <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" 
                                       class="btn btn-danger btn-sm fw-bold" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa môn này?');">Xóa</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(courses)}">
                                <td colspan="5" class="text-muted py-4">Chưa có môn học nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
